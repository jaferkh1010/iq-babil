<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الدردشة | IQ Babil</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container { max-width: 600px; margin: 20px auto; background: white; height: 80vh; display: flex; flex-direction: column; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 70%; font-size: 14px; }
        .sent { align-self: flex-start; background: var(--primary); color: white; }
        .received { align-self: flex-end; background: #e0e0e0; color: #333; }
        .chat-input { display: flex; padding: 15px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">IQ Babil - الدردشة</div>
    <div id="chatWith" style="font-weight: bold; color: var(--gold);"></div>
</header>

<div class="chat-container">
    <div id="messages"></div>
    <div class="chat-input">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك هنا..." style="flex:1; border:none; padding:10px; outline:none;">
        <button id="sendBtn" class="btn-main">إرسال</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCTehQky9-w6mcAEV0gRnCDOdGrZ80CwcA",
        authDomain: "iq-babil.firebaseapp.com",
        databaseURL: "https://iq-babil-default-rtdb.firebaseio.com/",
        projectId: "iq-babil",
        appId: "1:426646652255:web:1c6b275301a8a15e54a2ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const user = JSON.parse(localStorage.getItem('currentUser'));
    const params = new URLSearchParams(window.location.search);
    const propertyTitle = params.get('prop') || "عام";

    document.getElementById('chatWith').innerText = "عقار: " + propertyTitle;

    if(!user) { alert("سجل دخولك أولاً!"); window.location.href="login.html"; }

    // إرسال رسالة
    document.getElementById('sendBtn').onclick = () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        const msgRef = push(ref(db, 'chats/' + propertyTitle));
        set(msgRef, {
            sender: user.name,
            text: text,
            time: Date.now()
        });
        document.getElementById('msgInput').value = "";
    };

    // استقبال الرسائل فوراً
    onValue(ref(db, 'chats/' + propertyTitle), (snapshot) => {
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = "";
        const data = snapshot.val();
        if(data) {
            Object.values(data).forEach(m => {
                const isMe = m.sender === user.name;
                messagesDiv.innerHTML += `<div class="msg ${isMe?'sent':'received'}"><strong>${m.sender}:</strong><br>${m.text}</div>`;
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إضافة عقار جديد | IQ Babil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: var(--light-bg); padding: 40px 0;">

<div style="max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
    <h2 style="color: var(--primary); text-align: center; margin-bottom: 30px;">نشر عقار جديد على السحاب ☁️</h2>
    <form id="addForm">
        <label>عنوان العقار</label>
        <input type="text" id="title" placeholder="مثال: بيت حديث للبيع" style="width:100%; padding:12px; margin:10px 0 20px; border-radius:8px; border:1px solid #ddd;" required>
        
        <div style="display:flex; gap:15px;">
            <div style="flex:1;">
                <label>المحافظة</label>
                <input type="text" id="prov" placeholder="بابل" style="width:100%; padding:12px; margin:10px 0 20px; border-radius:8px; border:1px solid #ddd;">
            </div>
            <div style="flex:1;">
                <label>المنطقة</label>
                <input type="text" id="dist" placeholder="الحلة" style="width:100%; padding:12px; margin:10px 0 20px; border-radius:8px; border:1px solid #ddd;">
            </div>
        </div>

        <div style="display:flex; gap:15px;">
            <div style="flex:1;">
                <label>السعر ($)</label>
                <input type="number" id="price" style="width:100%; padding:12px; margin:10px 0 20px; border-radius:8px; border:1px solid #ddd;">
            </div>
            <div style="flex:1;">
                <label>رقم الهاتف</label>
                <input type="tel" id="phone" style="width:100%; padding:12px; margin:10px 0 20px; border-radius:8px; border:1px solid #ddd;">
            </div>
        </div>

        <label>التفاصيل</label>
        <textarea id="details" rows="4" style="width:100%; padding:12px; margin:10px 0 20px; border-radius:8px; border:1px solid #ddd;"></textarea>

        <label>صورة العقار</label>
        <input type="file" id="imgFile" accept="image/*" style="margin:10px 0 30px;" required>

        <button type="submit" id="subBtn" class="btn-main" style="width:100%; padding:15px; font-size:18px;">نشر العقار الآن ✅</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCTehQky9-w6mcAEV0gRnCDOdGrZ80CwcA",
        authDomain: "iq-babil.firebaseapp.com",
        databaseURL: "https://iq-babil-default-rtdb.firebaseio.com/",
        projectId: "iq-babil",
        appId: "1:426646652255:web:1c6b275301a8a15e54a2ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let base64String = "";
    document.getElementById('imgFile').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => base64String = ev.target.result;
        reader.readAsDataURL(file);
    };

    document.getElementById('addForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.innerText = "جاري الحفظ بالسحاب...";
        btn.disabled = true;

        try {
            const newRef = push(ref(db, 'properties'));
            await set(newRef, {
                title: document.getElementById('title').value,
                prov: document.getElementById('prov').value,
                dist: document.getElementById('dist').value,
                price: document.getElementById('price').value,
                phone: document.getElementById('phone').value,
                details: document.getElementById('details').value,
                img: base64String,
                timestamp: Date.now()
            });
            alert("تم النشر بنجاح!");
            window.location.href = "index.html";
        } catch (err) {
            alert("خطأ: " + err.message);
            btn.disabled = false;
        }
    };
</script>
</body>
</html>

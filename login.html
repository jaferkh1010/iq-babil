<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | IQ Babil</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-card { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body style="background: var(--light-bg);">

<div class="login-card">
    <h2 style="color: var(--primary);">تسجيل الدخول</h2>
    <p style="color: #666; font-size: 14px;">أدخل اسمك للدخول إلى النظام</p>
    <input type="text" id="userName" placeholder="الاسم الكامل" required>
    <select id="userRole" style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd;">
        <option value="user">مستخدم (باحث عن عقار)</option>
        <option value="admin">أدمن (صاحب عقارات)</option>
    </select>
    <button onclick="login()" class="btn-main" style="width: 100%; padding: 15px; margin-top: 20px; font-size: 16px;">دخول</button>
</div>

<script>
    function login() {
        const name = document.getElementById('userName').value;
        const role = document.getElementById('userRole').value;
        if (!name) return alert("يرجى إدخال الاسم");
        
        const userData = { name: name, role: role, id: "user_" + Date.now() };
        localStorage.setItem('currentUser', JSON.stringify(userData));
        window.location.href = "index.html";
    }
</script>
</body>
</html>

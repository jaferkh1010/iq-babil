<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ Babil | سمسار بابل الذكي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">IQ Babil For Property</div>
    <div id="authSection"></div>
</header>

<section class="hero">
    <h1 style="margin-bottom: 20px;">عقارات بابل بين يديك بذكاء 🤖</h1>
    <div style="background:white; width: 85%; max-width: 600px; display: flex; padding: 5px; border-radius: 50px; box-shadow: 0 5px 20px rgba(0,0,0,0.3);">
        <input type="text" id="aiQuery" placeholder="مثلاً: بيت في الحلة أقل من 200 مليون..." style="flex:1; border:none; padding:15px 25px; outline:none; border-radius: 50px; font-size:16px;">
        <button onclick="askAI()" class="btn-main" style="border-radius: 50px; background:var(--gold); padding:0 30px;">بحث</button>
    </div>
</section>

<div id="mainGrid" class="grid">
    <div style="grid-column: 1/-1; text-align: center; padding: 50px;">جاري تحميل العقارات من السحاب...</div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="modalImg" style="width:100%; height:350px; object-fit:cover;">
        <div style="padding: 30px;">
            <h2 id="modalTitle" style="color:var(--primary); margin:0;"></h2>
            <p id="modalLoc" style="color:var(--gold); font-weight:bold; margin:10px 0;"></p>
            <p id="modalDesc" style="line-height:1.7; color:#555; background:#f4f7f6; padding:15px; border-radius:12px;"></p>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:25px; border-top:1px solid #eee; pt:20px;">
                <span id="modalPrice" style="font-size:28px; font-weight:bold; color:var(--primary);"></span>
                <button onclick="startChat()" class="btn-main" style="background:var(--gold); font-size:18px;">تواصل الآن 💬</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCTehQky9-w6mcAEV0gRnCDOdGrZ80CwcA",
        authDomain: "iq-babil.firebaseapp.com",
        databaseURL: "https://iq-babil-default-rtdb.firebaseio.com/",
        projectId: "iq-babil",
        storageBucket: "iq-babil.firebasestorage.app",
        appId: "1:426646652255:web:1c6b275301a8a15e54a2ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let allProperties = [];

    onValue(ref(db, 'properties'), (snapshot) => {
        const data = snapshot.val();
        allProperties = data ? Object.values(data) : [];
        render(allProperties);
    });

    window.render = (props) => {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = props.length ? "" : "<h3 style='grid-column:1/-1; text-align:center;'>لم نجد نتائج مطابقة لبحثك.</h3>";
        props.forEach((p, i) => {
            grid.innerHTML += `
                <div class="card" onclick="openDetails('${p.title}')">
                    <img src="${p.img}">
                    <div class="card-content">
                        <span style="font-size:12px; color:var(--gold);">📍 ${p.prov} - ${p.dist}</span>
                        <h3 style="margin:8px 0; color:var(--primary);">${p.title}</h3>
                        <p style="color:#222; font-weight:bold; font-size:20px;">$${Number(p.price).toLocaleString()}</p>
                    </div>
                </div>`;
        });
        window.currentData = props;
    };

    window.openDetails = (title) => {
        const p = allProperties.find(x => x.title === title);
        document.getElementById('modalImg').src = p.img;
        document.getElementById('modalTitle').innerText = p.title;
        document.getElementById('modalLoc').innerText = "📍 " + p.prov + " - " + p.dist;
        document.getElementById('modalDesc').innerText = p.details;
        document.getElementById('modalPrice').innerText = "$" + Number(p.price).toLocaleString();
        document.getElementById('detailsModal').style.display = "block";
    };
</script>

<script>
    // نظام الـ Login والذكاء الاصطناعي
    const user = JSON.parse(localStorage.getItem('currentUser'));
    document.getElementById('authSection').innerHTML = user ? 
        `أهلاً ${user.name} ${user.role==='admin'?' | <a href="add.html" style="color:var(--primary); text-decoration:none; font-weight:bold;">+ إضافة عقار</a>':''} | <button onclick="localStorage.removeItem('currentUser'); location.reload();" style="border:none; background:none; color:red; cursor:pointer;">خروج</button>` :
        `<button onclick="location.href='login.html'" class="btn-main">تسجيل الدخول</button>`;

    function closeModal() { document.getElementById('detailsModal').style.display = "none"; }
   function startChat() {
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if(!user) {
        alert("يرجى تسجيل الدخول أولاً للمراسلة!");
        window.location.href = 'login.html';
        return;
    }
    const propTitle = document.getElementById('modalTitle').innerText;
    window.location.href = `chat.html?prop=${encodeURIComponent(propTitle)}`;
}

    async function askAI() {
        const q = document.getElementById('aiQuery').value;
        if(!q) return;
        const btn = document.querySelector('.hero button');
        btn.innerText = "...";
        
        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyBfBCioj73iKw9Gxfxm0m4gqx-VgVM7gaU`, {
                method: "POST", headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ contents: [{ parts: [{ text: `حلل الطلب التالي واستخرج منه (المحافظة، السعر الأقصى) بصيغة JSON فقط: "${q}"` }] }] })
            });
            const res = await resp.json();
            const cleanJson = res.candidates[0].content.parts[0].text.match(/\{.*\}/s)[0];
            const filter = JSON.parse(cleanJson);
            
            const filtered = window.currentData.filter(p => {
                return (!filter.المحافظة || p.prov.includes(filter.المحافظة)) &&
                       (!filter["السعر الأقصى"] || Number(p.price) <= filter["السعر الأقصى"]);
            });
            render(filtered);
            btn.innerText = "بحث";
        } catch (e) { console.error(e); btn.innerText = "بحث"; }
    }
</script>
</body>
</html>
